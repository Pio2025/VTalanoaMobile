name: vtalanoa_app
description: VTalanoa - Video Meeting Platform for mobile, desktop & web.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # WebRTC — camera, mic, peer connections
  flutter_webrtc: ^1.5.2

  # Networking
  dio: ^5.7.0
  socket_io_client: ^2.0.3+1

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.2.7

  # Secure local storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # Permissions (camera, mic, storage)
  permission_handler: ^11.3.1

  # Media picking for chat
  image_picker: ^1.1.2
  file_picker: ^11.0.2

  # Emoji picker for chat input
  emoji_picker_flutter: ^3.1.0

  # AES-GCM for E2EE chat text (media E2EE uses flutter_webrtc's native FrameCryptor)
  cryptography: ^2.7.0

  # Image display
  cached_network_image: ^3.3.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  timeago: ^3.7.0

  # Charts (meeting analytics)
  fl_chart: ^0.69.0

  # Opening uploaded file links
  url_launcher: ^6.3.1
  app_links: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/logos/
    - assets/navuli/

flutter_launcher_icons:
  image_path: "assets/icons/icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#ffffff"
  web:
    generate: true
    image_path: "assets/icons/icon.png"
    background_color: "#ffffff"
    theme_color: "#1C75BC"
  windows:
    generate: true
    image_path: "assets/icons/icon.png"
    icon_size: 256
