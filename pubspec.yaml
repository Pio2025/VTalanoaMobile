name: vtalanoa_app
description: VTalanoa - Video Meeting Platform for mobile, desktop & web.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # WebRTC — camera, mic, peer connections
  flutter_webrtc: ^1.5.2

  # Networking
  dio: ^5.7.0
  socket_io_client: ^2.0.3+1

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.2.7

  # Secure local storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # Permissions (camera, mic, storage)
  permission_handler: ^11.3.1

  # Media picking for chat
  image_picker: ^1.1.2
  file_picker: ^8.1.4

  # Image display
  cached_network_image: ^3.3.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  timeago: ^3.7.0

  # Charts (meeting analytics)
  fl_chart: ^0.69.0

  # Opening uploaded file links
  url_launcher: ^6.3.1
  app_links: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/logos/
    - assets/navuli/
